name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Build (production bundle)
        # Catches production-only failures (Vite tree-shaking surprises,
        # base-path resolution, missing dynamic imports) that the dev
        # server's looser pipeline can hide.
        run: pnpm --filter @vistrates/web build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
